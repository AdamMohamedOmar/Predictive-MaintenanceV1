[pytest]
# Run pytest from repo root: `pytest`
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Strict markers catch typos: @pytest.mark.sloww would fail instead of silently running.
addopts = -ra --strict-markers

# Registered markers. Add new ones here as tests need them.
markers =
    slow: tests that take more than 5 seconds (skip with -m "not slow")
    integration: tests that require external data (e.g. carOBD CSVs)
    hardware: tests that require the ELM327 adapter plugged in
