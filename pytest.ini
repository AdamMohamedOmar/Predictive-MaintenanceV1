[pytest]
# Test discovery is rooted at tests/. Keeping this explicit means a bare
# `pytest` from the repo root runs exactly the suite and nothing under
# scripts/investigations or notebooks.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# The third-party stack (matplotlib, shap, xgboost) emits a large volume of
# DeprecationWarnings that are not actionable from this codebase. Silence only
# those so real warnings from our own modules stay visible.
filterwarnings =
    ignore::DeprecationWarning:matplotlib.*
    ignore::DeprecationWarning:shap.*
    ignore::PendingDeprecationWarning
